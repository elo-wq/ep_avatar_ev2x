<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avatar</title>

<style>
body{
    margin:0;
    background:#cecece;
    font-family: monospace;
    font-size:16px;
    cursor: cell;
}

/* titre */
.title{
    font-size:28px;
    color:rgb(255, 1, 166);
    margin:12px 20px;
    cursor: default;
}

/* texte intro */
p{
    margin:12px 20px;
    color:rgb(55, 55, 55);
    font-size:15px;
    cursor: default;
}

/* container */
.menu{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* item */
.item{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:18px 0;
}

/* texte cliquable */
.click{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

/* AUDIO → NE PAS CACHER (important Firefox) */
audio{
    display:none;
    margin-top:10px;
}

/* images cachées */
.item img{
    display:none;
    margin-top:10px;
    width:220px;
    opacity:0.85;
    cursor:help;
    transition:0.2s;
}

.item img:hover{
    opacity:1;
    transform:scale(1.02);
}

img[src="cd.png"]{
    position:fixed;
    bottom:20px;
    right:20px;
    width:100px;
}

img hover[src="cd.png"]{
    transform:scale(1.05);
    transition:0.2s;
}
</style>
</head>

<body>

<details>
    <summary class="title">Avatar</summary>
    <p>Expérimentation et bidouillage</p>
    <p>Eloxx et Elia = EV2X</p>
    <p>2025–2026</p>
    <p><a href="https://soundcloud.com/elia-111429197/sets/avatar-the-ep" target="_blank">soundcloud</a></p>
</details>

<div class="menu">

    <div class="item">
        <span class="click" onclick="reveal(this)">Choose an avatar</span>
 <!--     <a href="https://www.youtube.com/watch?v=XXXX" target="_blank" </a>>… --> 
    
            <img src="choose.png">
      

        <audio controls>
            <source src="music/1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="item">
        <span class="click" onclick="reveal(this)">General Distortion</span>

 <!--     <a href="https://www.youtube.com/watch?v=XXXX" target="_blank" </a>>… --> 
    
            <img src="general.png">
    

        <audio controls>
            <source src="music/2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="item">
        <span class="click" onclick="reveal(this)">Never Forever</span>

 <!--     <a href="https://www.youtube.com/watch?v=XXXX" target="_blank" </a>>… --> 
    
            <img src="dino.jpg">
     
        <audio controls>
            <source src="music/3.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="item">
        <span class="click" onclick="reveal(this)">Le Grand Jeu</span>

 <!--     <a href="https://www.youtube.com/watch?v=XXXX" target="_blank" </a>>… --> 
    
            <img src="legrandjeu.png">
    

        <audio controls>
            <source src="music/4.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="item">
        <span class="click" onclick="reveal(this)">Surrender</span>

 <!--     <a href="https://www.youtube.com/watch?v=XXXX" target="_blank" </a>>… --> 
            <img src="surrender1.png">
    

        <audio controls>
            <source src="music/5.mp3" type="audio/mpeg">
        </audio>
    </div>

</div>
<a href="https://soundcloud.com/elia-111429197/sets/avatar-the-ep" target="_blank">
    <img src="cd.png" alt="CD">
</a>

<script>
function reveal(el){

    const parent = el.parentElement;

    // pause tous les sons
    document.querySelectorAll("audio").forEach(a=>{
        a.pause();
        a.style.display="none";
        a.currentTime = 0;
    });

    // cacher toutes les images
    document.querySelectorAll(".item img").forEach(i=>{
        i.style.display="none";
    });

    // afficher audio du bloc
    const audio = parent.querySelector("audio");
    audio.style.display="block";

    // afficher image du bloc
    const img = parent.querySelector("img");
    img.style.display="block";
}
</script>

</body>
</html>
