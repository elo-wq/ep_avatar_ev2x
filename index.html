<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avatar</title>

<style>
body{
    margin:0;
    background:#bcbcbc;
    font-family: monospace;
    font-size:16px;
}

.title{
    font-size:28px;
    color:rgb(255, 1, 166);
    margin:12px 20px;
}

p{
    margin:12px 20px;
    color:rgb(55, 55, 55);
    font-size:15px;
}

.menu{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.item{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:18px 0;
}

/* titre cliquable */
.click{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

/* audio caché */
audio{
    display:none;
    margin-top:8px;
}

/* image cachée */
.item img{
    display:none;
    margin-top:10px;
    width:220px;
    opacity:0.85;
    cursor:pointer;
    transition:0.2s;
}

.item img:hover{
    opacity:1;
    transform:scale(1.02);
}
</style>
</head>

<body>

<details>
    <summary class="title">Avatar</summary>
    <p>Expérimentation et bidouillage </p>
    <p style="display: inline; margin-left: 6em;"> Eloxx et Elia = EV2X</p>
    <p>2025-2026</p>
   <p> <a href="https://soundcloud.com/elia-111429197/sets/avatar-the-ep" target="_blank">soundcloud</a></p> 
</details>

<div class="menu">

    <div class="item">
        <span class="click" onclick="reveal(this)">Choose an avatar</span>

    <a href="https://www.youtube.com/watch?v=XXXX" target="_blank">
            <img src="choose.png">
        </a>
        <audio controls>
            <source src="music/1.mp3">
        </audio>

    </div>

    <div class="item">
        <span class="click" onclick="reveal(this)">General Distortion</span>

          <a href="https://www.youtube.com/watch?v=XXXX" target="_blank">
            <img src="general.png">
        </a>

        <audio controls>
            <source src="music/2.mp3">
        </audio>

    
    </div>

    <div class="item">
        <span class="click" onclick="reveal(this)">Never Forever</span>

          <a href="https://www.youtube.com/watch?v=XXXX" target="_blank">
            <img src="dino.jpg">
        </a>
        <audio controls>
            <source src="music/3.mp3">
        </audio>

    </div>

     <div class="item">
        <span class="click" onclick="reveal(this)">Le Grand Jeu</span>

         <a href="https://www.youtube.com/watch?v=XXXX" target="_blank">

     <div class="item">

        </audio>

    
    </div>

</div>

<script>
function reveal(el){

    const parent = el.parentElement;

    // reset
    document.querySelectorAll("audio").forEach(a=>{
        a.pause();
        a.style.display="none";
    });

    document.querySelectorAll("img").forEach(i=>{
        i.parentElement.style.display = "inline-block";
        i.style.display="none";
    });

    // audio
    const audio = parent.querySelector("audio");
    audio.style.display="block";

    // image (dans le lien)
    const img = parent.querySelector("img");
    img.style.display="block";
}
</script>

</body>
</html>
