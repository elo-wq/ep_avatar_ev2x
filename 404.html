<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Not Found</title>

<style>
body{
    margin:0;
    background:#cecece;
    font-family: monospace;
    font-size:16px;
}

/* titre 404 */
.title{
    font-size:34px;
    color:rgb(255, 1, 166);
    margin:12px 20px;
}

/* texte */
p{
    margin:12px 20px;
    color:rgb(55, 55, 55);
    font-size:15px;
}

/* container */
.menu{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:40px;
}

/* item */
.item{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:18px 0;
}

/* texte cliquable */
.click{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

/* AUDIO */
audio{
    display:none;
    margin-top:10px;
}

/* images cachées */
.item img{
    display:none;
    margin-top:10px;
    width:220px;
    opacity:0.85;
    cursor:pointer;
    transition:0.2s;
}

.item img:hover{
    opacity:1;
    transform:scale(1.02);
}

/* effet 404 */
.error{
    text-align:center;
    margin-top:40px;
    font-size:18px;
    color:#333;
}
</style>
</head>

<body>

<div class="error">
    <div class="title">404</div>
    <p>Page perdue, internet is gone</p>
    <p>EV2X 2026</p>
</div>

</body>
</html>
